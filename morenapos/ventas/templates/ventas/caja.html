{% extends 'base.html' %}

{% block title %}MorenaPOS - Caja{% endblock %}

{% block content %}
<div style="padding: 32px; max-width: 600px; margin: 0 auto;">
    <div style="background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.1);">
        <h1 style="font-size: 24px; font-weight: 700; color: #333; margin-bottom: 24px;">
            <i class="fas fa-cash-register" style="color: #FC523B; margin-right: 8px;"></i>
            Módulo de Caja
        </h1>

        <div style="border-top: 2px solid #FFC801; padding-top: 20px;">
            <div style="margin-bottom: 16px;">
                <label style="font-size: 12px; color: #999; text-transform: uppercase; font-weight: 600;">Usuario</label>
                <p style="font-size: 18px; color: #333; font-weight: 600;">{{ usuario_nombre }}</p>
                <p style="font-size: 13px; color: #666;">@{{ usuario_login }}</p>
            </div>

            <div style="margin-bottom: 16px;">
                <label style="font-size: 12px; color: #999; text-transform: uppercase; font-weight: 600;">Sede</label>
                <p style="font-size: 18px; color: #333; font-weight: 600;">{{ sede_nombre }}</p>
            </div>

            <div style="margin-bottom: 16px;">
                <label style="font-size: 12px; color: #999; text-transform: uppercase; font-weight: 600;">Turno</label>
                <p style="font-size: 18px; color: #333; font-weight: 600; text-transform: capitalize;">{{ turno }}</p>
            </div>

            <div style="margin-bottom: 16px;">
                <label style="font-size: 12px; color: #999; text-transform: uppercase; font-weight: 600;">Rol</label>
                <p style="font-size: 18px; color: #333; font-weight: 600;">{{ rol }}</p>
            </div>
        </div>

        <div style="margin-top: 24px; padding-top: 20px; border-top: 1px solid #eee; text-align: center;">
            <p style="color: #999; font-size: 13px;">
                <i class="fas fa-info-circle" style="color: #FFC801; margin-right: 4px;"></i>
                Módulo en construcción - próximamente
            </p>
        </div>
    </div>
</div>
{% endblock %}
