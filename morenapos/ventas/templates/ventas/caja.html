{% extends 'base.html' %}

{% block title %}MorenaPOS - Caja{% endblock %}

{% block content %}
<div class="py-6">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-white">
            <i class="fas fa-cash-register mr-3"></i>Módulo de Caja
        </h1>
        <p class="text-gray-400 mt-2">
            <i class="fas fa-store mr-2"></i>{{ sede_nombre|default:'Sin sede' }}
        </p>
    </div>

    <div class="bg-gray-800 rounded-xl p-8 border border-gray-700 text-center">
        <i class="fas fa-tools text-6xl text-gray-600 mb-4"></i>
        <h2 class="text-2xl font-bold text-white mb-2">Módulo en Construcción</h2>
        <p class="text-gray-400">El módulo de caja está siendo implementado.</p>
        <a href="{% url 'dashboard' %}" class="inline-block mt-6 px-6 py-3 bg-gradient-to-r from-[#A40130] to-[#D20B36] text-white font-medium rounded-lg hover:opacity-90 transition duration-200">
            <i class="fas fa-arrow-left mr-2"></i>Volver al Dashboard
        </a>
    </div>
</div>
{% endblock %}
